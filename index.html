<!DOCTYPE html>
<html class="paga" lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link href="./css/index.css" rel="stylesheet" />
		<link
			rel="shortcut icon"
			type="image/x-icon"
			href="./img/icons/fen-favicon.ico"
		/>
		<title>фен dyson</title>
	</head>
	<body class="page__body">
		<header class="header">
			<div class="container header__container">
				<div class="header__burger">
					<button
						class="header__burger-button burger"
						aria-label="открыть меню"
						aria-expanded="false"
						aria-controls="header__menu"
					>
						<svg width="50" height="50">
							<use
								class="header__burger-icon"
								href="./img/icons/sprite.svg#burger"
							></use>
						</svg>
					</button>
				</div>
				<a class="logo header__logo" href="#">
					<img
						class="logo__img"
						src="./img/icons/logo-icon.svg"
						width="183"
						height="77"
						alt="Логотип Dyson"
					/>
				</a>
				<nav class="menu" class="header__menu" aria-label="главное меню">
					<ul class="menu__list">
						<li class="menu__item">
							<a class="menu__link" href="#">О нас</a>
						</li>
						<li class="menu__item">
							<a class="menu__link" href="#">Доставка и оплата</a>
						</li>
						<li class="menu__item">
							<a class="menu__link" href="#">Регистрация продукта</a>
						</li>
						<li class="menu__item">
							<a class="menu__link" href="#">Сервис</a>
						</li>
						<li class="menu__item">
							<a class="menu__link" href="#">Сертификаты и лицензии</a>
						</li>
					</ul>
				</nav>
				<div class="header__actions">
					<button
						class="header__actions-button"
						title="корзина"
						aria-label="корзина"
					>
						<svg width="36" height="36">
							<use
								class="header__actions-icon"
								href="./img/icons/sprite.svg#cart"
							></use>
						</svg>
					</button>
				</div>
			</div>
		</header>
	</body>
</html>
