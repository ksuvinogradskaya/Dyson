<!DOCTYPE html>
<html class="page" lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link href="./css/index.css" rel="stylesheet" />
		<link
			rel="shortcut icon"
			type="image/x-icon"
			href="./img/icons/fen-favicon.ico"
		/>
		<title>фен dyson</title>
	</head>
	<body class="page__body">
		<header class="header">
			<div class="container header__container">
				<div class="header__burger">
					<button
						class="header__burger-button burger"
						aria-label="открыть меню"
						aria-expanded="false"
						aria-controls="header__menu"
					>
						<svg class="header__burger-svg" width="50" height="50">
							<use
								class="header__burger-icon"
								href="./img/icons/sprite.svg#burger"
							></use>
						</svg>
					</button>
				</div>
				<a class="logo header__logo" href="#">
					<img
						class="logo__img"
						src="./img/icons/logo-icon.svg"
						width="183"
						height="77"
						alt="Логотип Dyson"
					/>
				</a>
				<nav class="menu header__menu" aria-label="главное меню">
					<ul class="menu__list">
						<li class="menu__item">
							<a class="menu__link" href="#">О нас</a>
						</li>
						<li class="menu__item">
							<a class="menu__link" href="#">Доставка и оплата</a>
						</li>
						<li class="menu__item">
							<a class="menu__link" href="#">Регистрация продукта</a>
						</li>
						<li class="menu__item">
							<a class="menu__link" href="#">Сервис</a>
						</li>
						<li class="menu__item">
							<a class="menu__link" href="#">Сертификаты и лицензии</a>
						</li>
					</ul>
				</nav>
				<div class="header__actions">
					<button
						class="header__actions-button"
						title="корзина"
						aria-label="корзина"
					>
						<svg class="header__actions-svg" width="36" height="36">
							<use
								class="header__actions-icon"
								href="./img/icons/sprite.svg#cart"
							></use>
						</svg>
					</button>
				</div>
			</div>
		</header>
		<main class="main">
			<section class="banner">
				<div class="container banner__container">
					<div class="banner__info">
						<h1 class="banner__title title__md">
							Уникальные технологии для ухода за волосами
						</h1>
						<p class="banner__text">
							Идеальная укладка для всех типов волос вместе с Dyson
						</p>
						<a class="banner__button" href="#">Подробнее</a>
					</div>
					<picture class="banner__images">
						<source srcset="./img/images/hero-girl.webp" />
						<img
							class="banner__img"
							src="./img/images/hero-girl.png"
							width="740"
							height="850"
							alt="девушка сушит волосы феном dyson в правой руке"
						/>
					</picture>
				</div>
			</section>
		</main>
	</body>
</html>
